name: Publish Docker Image

permissions:
  contents: read

on:
  release:
    types: [published]
  push:
    tags:
      - 'docker-rebuild-v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PLATFORMS: linux/amd64,linux/arm64
  IMAGE_NAME: isokoliuk/mcp-searxng

jobs:
  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Extract version from release or rebuild tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version=""
          publish_latest="false"

          if [ "${{ github.event_name }}" = "release" ]; then
            version="${{ github.event.release.tag_name }}"
            version="${version#v}"
            if [ "${{ github.event.release.prerelease }}" != "true" ]; then
              publish_latest="true"
            fi
          elif [[ "${GITHUB_REF_NAME}" == docker-rebuild-v* ]]; then
            version="${GITHUB_REF_NAME#docker-rebuild-v}"
            if [[ "${version}" != *-* ]]; then
              publish_latest="true"
            fi
          fi

          if [ -n "${version}" ]; then
            major="${version%%.*}"
            rest="${version#${major}.}"
            if [ "${rest}" != "${version}" ]; then
              minor_component="${rest%%.*}"
              major_minor="${major}.${minor_component}"
            else
              major_minor=""
            fi
            echo "has_version=true" >> "$GITHUB_OUTPUT"
            echo "version=${version}" >> "$GITHUB_OUTPUT"
            echo "major=${major}" >> "$GITHUB_OUTPUT"
            echo "major_minor=${major_minor}" >> "$GITHUB_OUTPUT"
          else
            echo "has_version=false" >> "$GITHUB_OUTPUT"
          fi

          echo "publish_latest=${publish_latest}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.PLATFORMS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME || secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ steps.version.outputs.has_version == 'true' }}
            type=raw,value=${{ steps.version.outputs.major_minor }},enable=${{ steps.version.outputs.major_minor != '' }}
            type=raw,value=${{ steps.version.outputs.major }},enable=${{ steps.version.outputs.major != '' }}
            type=raw,value=latest,enable=${{ steps.version.outputs.publish_latest == 'true' }}
            type=sha,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            GIT_BRANCH=${{ github.ref_name }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
